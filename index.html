<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#FAFAF8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>VYTAL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
/* ============================================
   VYTAL v2 — Tech-Sporty + ADHD Gamification
   ============================================ */

:root {
  --bg-primary: #FAFAF8;
  --bg-secondary: #FFFFFF;
  --bg-card: #FFFFFF;
  --bg-card-hover: #F5F5F2;
  --bg-warm: #F7F4F0;
  --bg-input: #F2F0EC;
  --text-primary: #1A1A1A;
  --text-secondary: #6B6B6B;
  --text-muted: #A0A0A0;
  --push-terracotta: #C4613A;
  --push-terracotta-soft: rgba(196, 97, 58, 0.08);
  --push-terracotta-medium: rgba(196, 97, 58, 0.15);
  --pull-sage: #5B8C6F;
  --pull-sage-soft: rgba(91, 140, 111, 0.08);
  --pull-sage-medium: rgba(91, 140, 111, 0.15);
  --accent-sand: #C4A86B;
  --accent-sand-soft: rgba(196, 168, 107, 0.08);
  --accent-sand-medium: rgba(196, 168, 107, 0.15);
  --rest-stone: #B8B0A4;
  --success: #5B8C6F;
  --danger: #C4613A;
  --xp-gold: #D4A843;
  --xp-gold-soft: rgba(212, 168, 67, 0.12);
  --border-subtle: rgba(0,0,0,0.06);
  --border-medium: rgba(0,0,0,0.1);
  --radius-sm: 10px;
  --radius-md: 14px;
  --radius-lg: 18px;
  --radius-xl: 22px;
  --shadow-card: 0 1px 3px rgba(0,0,0,0.04), 0 4px 12px rgba(0,0,0,0.03);
  --shadow-elevated: 0 2px 8px rgba(0,0,0,0.06), 0 8px 24px rgba(0,0,0,0.06);
  --shadow-hero: 0 4px 16px rgba(0,0,0,0.08), 0 12px 40px rgba(0,0,0,0.06);
  --shadow-glow-terra: 0 0 20px rgba(196, 97, 58, 0.25);
  --shadow-glow-sage: 0 0 20px rgba(91, 140, 111, 0.25);
  --shadow-glow-gold: 0 0 20px rgba(212, 168, 67, 0.35);
  --nav-height: 68px;
  --transition: 0.2s ease;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  font-size: 16px;
  -webkit-tap-highlight-color: transparent;
  -webkit-text-size-adjust: 100%;
}

body {
  font-family: 'Barlow', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  min-height: 100dvh;
  padding-bottom: calc(var(--nav-height) + 20px);
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  position: relative;
}

/* Tech grid pattern overlay */
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image:
    linear-gradient(rgba(0,0,0,0.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,0,0,0.015) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

body > *:not(.bottom-nav) { position: relative; z-index: 1; }

h1, h2, h3, h4 {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text-primary);
}

a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; border: none; background: none; -webkit-tap-highlight-color: transparent; }
img, svg { display: block; max-width: 100%; }

.container { width: 100%; max-width: 480px; margin: 0 auto; padding: 0 20px; }
.sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }

/* --- Top Header + XP Bar --- */
.top-header {
  padding: 16px 0 0;
  text-align: center;
}

.top-header .logo {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.5rem;
  font-weight: 900;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  color: var(--text-primary);
}
.top-header .logo span { color: var(--push-terracotta); }

.top-header .date-label {
  font-size: 0.78rem;
  color: var(--text-secondary);
  margin-top: 2px;
  text-transform: capitalize;
  font-weight: 400;
}

/* XP Bar in header */
.xp-header {
  margin: 10px 20px 0;
  max-width: 440px;
  margin-left: auto;
  margin-right: auto;
}

.xp-level-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 4px;
}

.xp-level-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--xp-gold);
}

.xp-amount {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.68rem;
  font-weight: 600;
  color: var(--text-muted);
}

.xp-bar-outer {
  width: 100%;
  height: 6px;
  background: var(--bg-input);
  border-radius: 3px;
  overflow: hidden;
  position: relative;
}

.xp-bar-fill {
  height: 100%;
  border-radius: 3px;
  background: linear-gradient(90deg, var(--xp-gold), #E8C860);
  transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  box-shadow: 0 0 8px rgba(212, 168, 67, 0.4);
}

.xp-bar-fill::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
  animation: xpShimmer 2s ease-in-out infinite;
}

@keyframes xpShimmer {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(100%); }
}

/* Streak display */
.streak-display {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  margin-top: 6px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--push-terracotta);
}

.streak-fire { font-size: 1rem; }
.streak-fire.medium { font-size: 1.3rem; }
.streak-fire.big { font-size: 1.6rem; animation: fireGlow 1s ease-in-out infinite alternate; }

@keyframes fireGlow {
  from { filter: brightness(1); }
  to { filter: brightness(1.3); }
}

/* --- Hero Card --- */
.hero-card {
  position: relative;
  border-radius: var(--radius-xl);
  padding: 28px 24px;
  margin: 14px 0 20px;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.15s ease, box-shadow 0.15s ease;
  color: #FFFFFF;
  box-shadow: var(--shadow-hero);
}

.hero-card:active { transform: scale(0.97); }

.hero-card.push { background: linear-gradient(135deg, #C4613A 0%, #A8492A 50%, #8C3820 100%); }
.hero-card.pull { background: linear-gradient(135deg, #5B8C6F 0%, #4A7A5E 50%, #3D6A50 100%); }
.hero-card.rest { background: linear-gradient(135deg, #B8B0A4 0%, #A09888 50%, #8A8274 100%); }

/* Tech pattern on hero */
.hero-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image:
    radial-gradient(circle at 2px 2px, rgba(255,255,255,0.06) 1px, transparent 1px);
  background-size: 20px 20px;
  pointer-events: none;
}

.hero-card .hero-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  opacity: 0.85;
}

.hero-card .hero-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 2rem;
  font-weight: 900;
  text-transform: uppercase;
  margin: 6px 0 8px;
  line-height: 1.05;
  letter-spacing: 0.03em;
}

.hero-card .hero-subtitle {
  font-size: 0.82rem;
  opacity: 0.75;
  font-weight: 400;
}

.hero-card .hero-arrow {
  position: absolute;
  right: 24px;
  top: 50%;
  transform: translateY(-50%);
  width: 44px;
  height: 44px;
  background: rgba(255,255,255,0.15);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1rem;
  backdrop-filter: blur(4px);
  transition: transform 0.2s ease;
}

.hero-card:active .hero-arrow { transform: translateY(-50%) scale(0.9); }

/* --- Week Progress --- */
.week-progress { margin: 0 0 20px; }

.week-progress h3 {
  font-size: 0.7rem;
  color: var(--text-muted);
  letter-spacing: 0.12em;
  margin-bottom: 10px;
  font-weight: 700;
}

.week-days { display: flex; gap: 8px; justify-content: space-between; }

.week-day {
  flex: 1;
  text-align: center;
  padding: 10px 4px 8px;
  border-radius: var(--radius-md);
  background: var(--bg-card);
  border: 1.5px solid transparent;
  box-shadow: var(--shadow-card);
  transition: all 0.2s ease;
}

.week-day .day-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.62rem;
  font-weight: 700;
  text-transform: uppercase;
  color: var(--text-muted);
  letter-spacing: 0.06em;
}

.week-day .day-type { width: 6px; height: 6px; border-radius: 50%; margin: 6px auto 0; }
.week-day.push .day-type { background: var(--push-terracotta); }
.week-day.pull .day-type { background: var(--pull-sage); }
.week-day.rest .day-type { background: var(--rest-stone); opacity: 0.4; }
.week-day.push .day-name { color: var(--push-terracotta); }
.week-day.pull .day-name { color: var(--pull-sage); }
.week-day.rest { opacity: 0.5; }
.week-day.today { border-color: var(--text-primary); opacity: 1; }
.week-day.completed .day-type { width: 8px; height: 8px; }
.week-day.completed::after {
  content: '';
  display: block;
  width: 10px; height: 10px;
  margin: 4px auto 0;
  background: var(--success);
  border-radius: 50%;
  animation: popIn 0.3s ease;
}

/* --- Quick Stats --- */
.quick-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 24px; }

.stat-card {
  background: var(--bg-card);
  border-radius: var(--radius-md);
  padding: 16px 12px;
  text-align: center;
  box-shadow: var(--shadow-card);
  border: 1.5px solid transparent;
  transition: all 0.2s ease;
}

.stat-card .stat-value {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.6rem;
  font-weight: 900;
  line-height: 1;
}

.stat-card .stat-label {
  font-size: 0.62rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-top: 6px;
  font-weight: 600;
}

.stat-card.terracotta .stat-value { color: var(--push-terracotta); }
.stat-card.terracotta { border-color: var(--push-terracotta-medium); }
.stat-card.sage .stat-value { color: var(--pull-sage); }
.stat-card.sage { border-color: var(--pull-sage-medium); }
.stat-card.sand .stat-value { color: var(--accent-sand); }
.stat-card.sand { border-color: var(--accent-sand-medium); }

/* --- Section Cards --- */
.section-card {
  background: var(--bg-card);
  border-radius: var(--radius-lg);
  padding: 18px;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 16px;
  cursor: pointer;
  transition: all 0.15s ease;
  box-shadow: var(--shadow-card);
  border: 1.5px solid transparent;
}

.section-card:active { transform: scale(0.97); background: var(--bg-card-hover); }

.section-card .card-icon {
  width: 48px; height: 48px;
  border-radius: var(--radius-md);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

.section-card .card-icon.terracotta { background: linear-gradient(135deg, var(--push-terracotta-soft), var(--push-terracotta-medium)); }
.section-card .card-icon.sage { background: linear-gradient(135deg, var(--pull-sage-soft), var(--pull-sage-medium)); }
.section-card .card-icon.sand { background: linear-gradient(135deg, var(--accent-sand-soft), var(--accent-sand-medium)); }

.section-card .card-icon svg { width: 22px; height: 22px; }
.section-card .card-content { flex: 1; }

.section-card .card-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.95rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

.section-card .card-desc { font-size: 0.72rem; color: var(--text-secondary); margin-top: 3px; }
.section-card .card-chevron { color: var(--text-muted); font-size: 1.2rem; font-weight: 300; }

/* --- Progress Bar --- */
.progress-bar {
  width: 100%;
  height: 4px;
  background: var(--bg-input);
  border-radius: 2px;
  overflow: hidden;
  margin-top: 8px;
}

.progress-bar .progress-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.4s ease;
}

.progress-bar .progress-fill.terracotta { background: var(--push-terracotta); }
.progress-bar .progress-fill.sage { background: var(--pull-sage); }
.progress-bar .progress-fill.sand { background: var(--accent-sand); }

/* --- Bottom Navigation --- */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: var(--nav-height);
  background: rgba(255,255,255,0.94);
  border-top: 1px solid var(--border-subtle);
  display: flex;
  align-items: center;
  justify-content: space-around;
  padding: 0 8px;
  padding-bottom: env(safe-area-inset-bottom, 0);
  z-index: 1000;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}

.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  padding: 8px 16px;
  border-radius: var(--radius-sm);
  transition: all 0.15s ease;
  position: relative;
  min-width: 60px;
}

.nav-item:active { transform: scale(0.9); }

.nav-item .nav-icon { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; }
.nav-item .nav-icon svg { width: 22px; height: 22px; stroke: var(--text-muted); fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; transition: all 0.15s ease; }

.nav-item .nav-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.6rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-muted);
  transition: color 0.15s ease;
}

.nav-item.active .nav-label { color: var(--text-primary); }
.nav-item.active .nav-icon svg { stroke: var(--text-primary); stroke-width: 2.2; }
.nav-item.active.terracotta .nav-icon svg { stroke: var(--push-terracotta); }
.nav-item.active.sage .nav-icon svg { stroke: var(--pull-sage); }
.nav-item.active.sand .nav-icon svg { stroke: var(--accent-sand); }
.nav-item.active.terracotta .nav-label { color: var(--push-terracotta); }
.nav-item.active.sage .nav-label { color: var(--pull-sage); }
.nav-item.active.sand .nav-label { color: var(--accent-sand); }

.nav-item .sync-badge {
  position: absolute; top: 4px; right: 8px;
  width: 7px; height: 7px;
  background: var(--danger);
  border-radius: 50%;
  border: 1.5px solid #FFFFFF;
  display: none;
}
.nav-item .sync-badge.visible { display: block; }

/* --- Exercise Card --- */
.exercise-card {
  background: var(--bg-card);
  border-radius: var(--radius-lg);
  padding: 20px;
  margin-bottom: 14px;
  box-shadow: var(--shadow-card);
  transition: all 0.3s ease;
  border: 2px solid transparent;
  overflow: hidden;
}

.exercise-card.ex-completed {
  padding: 14px 20px;
  border-color: var(--success);
  box-shadow: var(--shadow-card), var(--shadow-glow-sage);
}

.exercise-card.ex-completed .exercise-body { display: none; }

.exercise-card.ex-completed .exercise-header { margin-bottom: 0; }

.exercise-card .completed-badge {
  display: none;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.68rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--success);
  background: var(--pull-sage-soft);
  padding: 3px 10px;
  border-radius: 20px;
  margin-left: auto;
}

.exercise-card.ex-completed .completed-badge { display: inline-block; animation: popIn 0.3s ease; }

.exercise-card .exercise-header {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 16px;
}

.exercise-card .exercise-number {
  width: 32px; height: 32px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800;
  font-size: 0.85rem;
  flex-shrink: 0;
}

.exercise-card.push .exercise-number { background: var(--push-terracotta-medium); color: var(--push-terracotta); }
.exercise-card.pull .exercise-number { background: var(--pull-sage-medium); color: var(--pull-sage); }

.exercise-card .exercise-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.02em;
}

.exercise-card .exercise-meta { font-size: 0.68rem; color: var(--text-secondary); margin-top: 1px; }

.exercise-card .svg-container {
  background: linear-gradient(135deg, var(--bg-warm), var(--bg-input));
  border-radius: var(--radius-md);
  padding: 16px;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 110px;
}

.exercise-card .svg-container svg { width: 100%; max-width: 180px; height: auto; }

.exercise-card .bio-tip {
  background: var(--bg-warm);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  margin-bottom: 14px;
  font-size: 0.73rem;
  color: var(--text-secondary);
  line-height: 1.5;
  border-left: 3px solid;
}

.exercise-card.push .bio-tip { border-color: var(--push-terracotta); }
.exercise-card.pull .bio-tip { border-color: var(--pull-sage); }
.bio-tip strong { color: var(--text-primary); font-weight: 600; }

/* Series Tracker - Updated for inline reps */
.series-tracker {
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
}

.series-btn {
  flex: 1;
  padding: 12px 6px;
  border-radius: var(--radius-sm);
  background: var(--bg-warm);
  border: 2px solid transparent;
  text-align: center;
  transition: all 0.15s ease;
  min-height: 64px;
  position: relative;
}

.series-btn:active { transform: scale(0.95); }

.series-btn .series-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.65rem;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

.series-btn .series-reps {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.2rem;
  font-weight: 800;
  margin-top: 2px;
  color: var(--text-primary);
}

.series-btn.completed.push {
  border-color: var(--push-terracotta);
  background: var(--push-terracotta-soft);
  animation: setComplete 0.3s ease;
}
.series-btn.completed.push .series-label { color: var(--push-terracotta); }

.series-btn.completed.pull {
  border-color: var(--pull-sage);
  background: var(--pull-sage-soft);
  animation: setComplete 0.3s ease;
}
.series-btn.completed.pull .series-label { color: var(--pull-sage); }

@keyframes setComplete {
  0% { transform: scale(1); }
  50% { transform: scale(1.1); }
  100% { transform: scale(1); }
}

/* Rep selector (inline, no prompt) */
.rep-selector {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  margin-top: 4px;
}

.rep-preset {
  width: 28px; height: 22px;
  border-radius: 6px;
  background: var(--bg-input);
  border: 1px solid var(--border-subtle);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.7rem;
  font-weight: 700;
  color: var(--text-secondary);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: all 0.1s ease;
}

.rep-preset:active { transform: scale(0.9); }

/* Weight Input */
.weight-row { display: flex; align-items: center; gap: 8px; }

.weight-row .weight-input {
  width: 76px;
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  background: var(--bg-warm);
  border: 1.5px solid transparent;
  color: var(--text-primary);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.1rem;
  font-weight: 700;
  text-align: center;
  transition: border-color 0.2s ease;
}

.weight-row .weight-input:focus { outline: none; border-color: var(--accent-sand); }
.weight-row .weight-unit { font-size: 0.78rem; color: var(--text-muted); font-weight: 500; }
.weight-row .weight-suggestion { font-size: 0.68rem; color: var(--push-terracotta); margin-left: auto; font-weight: 600; }

/* Rest Timer */
.rest-timer {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  padding: 14px;
  background: linear-gradient(135deg, var(--bg-warm), var(--bg-input));
  border-radius: var(--radius-md);
  margin-top: 14px;

.rest-timer .timer-display {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.8rem;
  font-weight: 800;
  min-width: 72px;

}

.rest-timer.running .timer-display { animation: timerPulse 1s ease-in-out infinite; }
.rest-timer.done .timer-display { color: var(--danger); animation: timerFlash 0.5s ease infinite; }

@keyframes timerPulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.7; }
}

@keyframes timerFlash {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

.rest-timer .timer-btn {
  width: 44px; height: 44px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;

.rest-timer .timer-btn:active { transform: scale(0.88); }
.rest-timer .timer-btn.start { background: linear-gradient(135deg, var(--push-terracotta), #A8492A); color: #FFFFFF; box-shadow: 0 2px 8px rgba(196, 97, 58, 0.3); }
.rest-timer .timer-btn.reset { background: var(--bg-input); color: var(--text-secondary); }

/* Day Progress - Prominent with glow */
.day-progress { margin-bottom: 20px; }

.day-progress .dp-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}

.day-progress .dp-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.8rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-secondary);
}

.day-progress .dp-count {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.95rem;
  font-weight: 800;
  color: var(--text-primary);
}

.day-progress .dp-percentage {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.72rem;
  font-weight: 700;
  color: var(--text-muted);
  margin-left: 6px;
}

.day-progress .progress-bar {
  height: 8px;
  border-radius: 4px;
  margin-top: 0;
}

.day-progress .progress-bar .progress-fill {
  border-radius: 4px;
  transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
}

.day-progress .progress-bar .progress-fill.terracotta { box-shadow: 0 0 12px rgba(196, 97, 58, 0.35); }
.day-progress .progress-bar .progress-fill.sage { box-shadow: 0 0 12px rgba(91, 140, 111, 0.35); }

.day-progress .progress-bar .progress-fill::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
  animation: xpShimmer 2.5s ease-in-out infinite;
  border-radius: 4px;
}

/* --- Nutrition --- */
.meal-card {
  background: var(--bg-card);
  border-radius: var(--radius-lg);
  padding: 18px;
  margin-bottom: 12px;
  box-shadow: var(--shadow-card);
}

.meal-card .meal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }

.meal-card .meal-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.92rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

.meal-card .meal-kcal { font-size: 0.72rem; color: var(--accent-sand); font-weight: 700; }
.meal-card .meal-items { list-style: none; }

.meal-card .meal-item {
  display: flex;
  justify-content: space-between;
  padding: 7px 0;
  border-bottom: 1px solid var(--border-subtle);
  font-size: 0.78rem;
}

.meal-card .meal-item:last-child { border-bottom: none; }
.meal-card .meal-item .item-name { color: var(--text-secondary); }
.meal-card .meal-item .item-amount { color: var(--text-primary); font-weight: 500; }

.meal-macros {
  display: flex;
  justify-content: space-between;
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid var(--border-subtle);
  font-size: 0.68rem;
  color: var(--text-muted);
  font-weight: 600;
}

.macro-progress { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 24px; }
.macro-item { text-align: center; }

.macro-ring { width: 64px; height: 64px; margin: 0 auto 8px; position: relative; }
.macro-ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
.macro-ring circle { fill: none; stroke-width: 4.5; }
.macro-ring .ring-bg { stroke: var(--bg-input); }
.macro-ring .ring-fill { stroke-linecap: round; transition: stroke-dashoffset 0.6s ease; }

.macro-ring .ring-value {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.85rem;
  font-weight: 800;
}

.macro-label {
  font-size: 0.62rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  font-weight: 600;
}

/* Water Tracker */
.water-tracker {
  background: var(--bg-card);
  border-radius: var(--radius-lg);
  padding: 18px;
  margin-bottom: 12px;
  box-shadow: var(--shadow-card);
}

.water-tracker .water-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }

.water-tracker .water-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.92rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

.water-tracker .water-count {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1rem;
  font-weight: 800;
  color: var(--pull-sage);
}

.water-glasses { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; }

.water-glass {
  width: 40px; height: 40px;
  border-radius: var(--radius-sm);
  background: var(--bg-warm);
  border: 1.5px solid transparent;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s ease;
  cursor: pointer;
}

.water-glass:active { transform: scale(0.9); }
.water-glass svg { width: 18px; height: 18px; stroke: var(--text-muted); fill: none; stroke-width: 1.8; }
.water-glass.filled { background: var(--pull-sage-soft); border-color: var(--pull-sage); animation: popIn 0.2s ease; }
.water-glass.filled svg { stroke: var(--pull-sage); fill: var(--pull-sage-soft); }

/* Supplement Tracker */
.supplement-card {
  background: var(--bg-card);
  border-radius: var(--radius-lg);
  padding: 20px 18px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 16px;
  cursor: pointer;
  transition: all 0.15s ease;
  box-shadow: var(--shadow-card);
}

.supplement-card:active { transform: scale(0.97); }

.supplement-card .supp-icon {
  width: 48px; height: 48px;
  border-radius: var(--radius-md);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

.supplement-card .supp-icon svg { width: 24px; height: 24px; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
.supplement-card .supp-info { flex: 1; }

.supplement-card .supp-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.92rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.02em;
}

.supplement-card .supp-dose { font-size: 0.72rem; color: var(--text-secondary); margin-top: 3px; }

.supplement-card .supp-check {
  width: 34px; height: 34px;
  border-radius: 50%;
  border: 2px solid var(--border-medium);
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s ease;
  color: transparent;
  font-size: 0.9rem;
  font-weight: 700;
}

.supplement-card .supp-check.done {
  border-color: var(--success);
  background: var(--pull-sage-soft);
  color: var(--success);
  animation: popIn 0.3s ease;
}

/* --- Page Header --- */
.page-header { display: flex; align-items: center; gap: 14px; margin: 10px 0 24px; }

.page-header .back-btn {
  width: 40px; height: 40px;
  border-radius: 50%;
  background: var(--bg-warm);
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.15s ease;
}

.page-header .back-btn:active { transform: scale(0.9); }
.page-header .back-btn svg { width: 18px; height: 18px; stroke: var(--text-secondary); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.page-header h2 { font-size: 1.15rem; font-weight: 800; }
.page-header h2.push { color: var(--push-terracotta); }
.page-header h2.pull { color: var(--pull-sage); }
.page-header h2.sand { color: var(--accent-sand); }

/* Day tabs */
.day-tabs {
  display: flex; gap: 6px; overflow-x: auto; padding: 0 0 12px;
  -webkit-overflow-scrolling: touch; scrollbar-width: none;
}
.day-tabs::-webkit-scrollbar { display: none; }

.day-tab {
  flex-shrink: 0;
  padding: 8px 14px;
  border-radius: var(--radius-sm);
  background: var(--bg-warm);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.74rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.15s ease;
  white-space: nowrap;
}

.day-tab:active { transform: scale(0.95); }
.day-tab.active { background: var(--text-primary); color: var(--bg-primary); }
.day-tab.training { border: 1.5px solid var(--push-terracotta-medium); }
.day-tab.rest { border: 1.5px solid var(--border-subtle); }

/* Modal */
.modal-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5); z-index: 2000;
  display: none; align-items: center; justify-content: center;
  padding: 16px; backdrop-filter: blur(4px);
}
.modal-overlay.open { display: flex; }

.modal-box {
  background: var(--bg-secondary);
  border-radius: var(--radius-xl);
  max-width: 440px; width: 100%;
  max-height: 85vh; overflow-y: auto;
  box-shadow: var(--shadow-elevated);
  padding: 20px;
  animation: modalIn 0.2s ease;
}

@keyframes modalIn {
  from { transform: scale(0.95); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

.modal-close {
  float: right;
  width: 36px; height: 36px;
  border-radius: 50%;
  background: var(--bg-warm);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-size: .9rem;
  color: var(--text-secondary);
}

.modal-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.1rem; font-weight: 800;
  text-transform: uppercase;
  margin: 8px 0 16px;
}

.phase-item { padding: 10px 0; border-bottom: 1px solid var(--border-subtle); }
.phase-item:last-child { border: none; }

.phase-label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: .72rem; font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .08em; margin-bottom: 4px;
}

.phase-label.start { color: var(--accent-sand); }
.phase-label.ecc { color: var(--pull-sage); }
.phase-label.con { color: var(--push-terracotta); }
.phase-text { font-size: .78rem; color: var(--text-secondary); line-height: 1.5; }

.error-list { list-style: none; margin: 12px 0 0; }
.error-list li { font-size: .75rem; color: var(--text-secondary); padding: 6px 0 6px 16px; position: relative; border-bottom: 1px solid var(--border-subtle); }
.error-list li:last-child { border: none; }
.error-list li::before { content: ''; position: absolute; left: 0; top: 12px; width: 6px; height: 6px; border-radius: 50%; background: var(--danger); }

/* Grocery */
.grocery-section { margin-bottom: 16px; }
.grocery-title { font-family: 'Barlow Condensed', sans-serif; font-size: .8rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--text-muted); margin-bottom: 8px; padding-bottom: 4px; border-bottom: 1px solid var(--border-subtle); }
.grocery-item { font-size: .78rem; color: var(--text-secondary); padding: 4px 0; }

/* --- Animations --- */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes popIn {
  0% { transform: scale(0.7); opacity: 0; }
  70% { transform: scale(1.1); }
  100% { transform: scale(1); opacity: 1; }
}

@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

@keyframes bounceIn {
  0% { transform: scale(0.3); opacity: 0; }
  50% { transform: scale(1.05); }
  70% { transform: scale(0.95); }
  100% { transform: scale(1); opacity: 1; }
}

.fade-in { animation: fadeIn 0.25s ease forwards; }
.pulse { animation: pulse 2s ease-in-out infinite; }

.page { display: none; }
.page.active { display: block; animation: fadeIn 0.25s ease; }

/* --- Confetti overlay --- */
.confetti-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  z-index: 3000;
  pointer-events: none;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.confetti-overlay .day-complete-msg {
  background: rgba(255,255,255,0.96);
  border-radius: var(--radius-xl);
  padding: 32px 40px;
  text-align: center;
  box-shadow: var(--shadow-hero);
  animation: bounceIn 0.5s ease;
  pointer-events: auto;
}

.confetti-overlay .day-complete-msg h2 {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.8rem;
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 8px;
}

.confetti-overlay .day-complete-msg .xp-earned {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.3rem;
  font-weight: 800;
  color: var(--xp-gold);
}

.confetti-piece {
  position: absolute;
  width: 10px;
  height: 10px;
  border-radius: 2px;
  animation: confettiFall 3s ease-out forwards;
}

@keyframes confettiFall {
  0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}

/* XP popup notification */
.xp-popup {
  position: fixed;
  top: 80px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 2500;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.1rem;
  font-weight: 800;
  color: var(--xp-gold);
  background: rgba(255,255,255,0.95);
  padding: 8px 20px;
  border-radius: 20px;
  box-shadow: var(--shadow-glow-gold);
  animation: xpPopup 1.5s ease forwards;
  pointer-events: none;
}

@keyframes xpPopup {
  0% { opacity: 0; transform: translateX(-50%) translateY(10px) scale(0.8); }
  20% { opacity: 1; transform: translateX(-50%) translateY(0) scale(1.05); }
  80% { opacity: 1; transform: translateX(-50%) translateY(-10px) scale(1); }
  100% { opacity: 0; transform: translateX(-50%) translateY(-30px) scale(0.9); }
}

/* Scrollbar */
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-medium); border-radius: 2px; }

@media (min-width: 480px) { .container { padding: 0 28px; } }
@media (min-width: 768px) { .container { max-width: 520px; } }
  </style>

  <script>
  /* ============================================
     VYTAL — Supabase Client + Offline Queue
     ============================================ */
  (function() {
    'use strict';

    var SUPABASE_URL = 'https://YOUR_PROJECT.supabase.co';
    var SUPABASE_KEY = 'YOUR_ANON_KEY';
    var client = null;
    var isOnline = navigator.onLine;

    function init() {
      if (window.supabase && window.supabase.createClient) {
        client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      }
    }

    var QUEUE_KEY = 'vytal_sync_queue';

    function getQueue() {
      try { return JSON.parse(localStorage.getItem(QUEUE_KEY)) || []; }
      catch (e) { return []; }
    }

    function saveQueue(queue) {
      localStorage.setItem(QUEUE_KEY, JSON.stringify(queue));
      updateSyncBadge();
    }

    function addToQueue(table, data) {
      var queue = getQueue();
      queue.push({ id: Date.now() + '_' + Math.random().toString(36).substr(2, 6), table: table, data: data, timestamp: new Date().toISOString() });
      saveQueue(queue);
    }

    function updateSyncBadge() {
      var queue = getQueue();
      var badges = document.querySelectorAll('.sync-badge');
      for (var i = 0; i < badges.length; i++) {
        if (queue.length > 0) badges[i].classList.add('visible');
        else badges[i].classList.remove('visible');
      }
    }

    function flushQueue() {
      if (!client || !isOnline) return Promise.resolve();
      var queue = getQueue();
      if (queue.length === 0) return Promise.resolve();
      var remaining = [];
      var promises = [];
      for (var i = 0; i < queue.length; i++) {
        (function(item) {
          var p = client.from(item.table).insert(item.data)
            .then(function(res) { if (res.error) remaining.push(item); })
            .catch(function() { remaining.push(item); });
          promises.push(p);
        })(queue[i]);
      }
      return Promise.all(promises).then(function() { saveQueue(remaining); });
    }

    function insert(table, data) {
      if (!client || !isOnline) { addToQueue(table, data); return Promise.resolve({ data: data, offline: true }); }
      return client.from(table).insert(data).select()
        .then(function(res) {
          if (res.error) { addToQueue(table, data); return { data: data, offline: true, error: res.error }; }
          return { data: res.data, offline: false };
        })
        .catch(function() { addToQueue(table, data); return { data: data, offline: true }; });
    }

    function select(table, filters) {
      if (!client || !isOnline) return Promise.resolve({ data: [], offline: true });
      var query = client.from(table).select('*');
      if (filters) { Object.keys(filters).forEach(function(key) { query = query.eq(key, filters[key]); }); }
      return query.order('created_at', { ascending: false }).limit(100)
        .then(function(res) { return { data: res.data || [], error: res.error }; })
        .catch(function() { return { data: [], offline: true }; });
    }

    function update(table, id, data) {
      if (!client || !isOnline) return Promise.resolve({ offline: true });
      return client.from(table).update(data).eq('id', id)
        .then(function(res) { return { data: res.data, error: res.error }; });
    }

    window.addEventListener('online', function() { isOnline = true; flushQueue(); });
    window.addEventListener('offline', function() { isOnline = false; });

    function localGet(key, fallback) {
      try { var v = localStorage.getItem('vytal_' + key); return v ? JSON.parse(v) : fallback; }
      catch (e) { return fallback; }
    }

    function localSet(key, value) {
      try { localStorage.setItem('vytal_' + key, JSON.stringify(value)); } catch (e) {}
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', function() { init(); updateSyncBadge(); flushQueue(); });
    } else { init(); updateSyncBadge(); flushQueue(); }

    window.VYTAL_DB = {
      insert: insert, select: select, update: update, flushQueue: flushQueue,
      getQueueLength: function() { return getQueue().length; },
      localGet: localGet, localSet: localSet, isOnline: function() { return isOnline; }
    };
  })();
  </script>

integrales (1 paquete)"],"frutas_verduras":["Platanos (6 piezas)","Aguacate (3 piezas)","Jitomate (6 piezas)","Lechuga (1 pieza)","Pepino (3 piezas)","Cebolla (2 piezas)","Chile serrano (al gusto)","Limon (6 piezas)","Manzana (2 piezas)","Fresas (500g)","Naranja para jugo (6 piezas)","Nopal (4 piezas)","Calabaza (2 piezas)","Chayote (2 piezas)"],"despensa":["Frijoles (500g o 2 latas)","Salsa verde (1 frasco)","Salsa roja (1 frasco)","Crema de cacahuate (1 frasco chico)","Aceite de oliva","Miel (1 frasco chico)","Mayonesa light (1 frasco chico)","Totopos (1 bolsa)"],"suplementos":["Creatina ON (ya en stock: 1.2kg)","Whey Protein ON (revisar stock)"]}};

    /* ============================================
       CONSTANTS
       ============================================ */
    var now = new Date();
    var TODAY_KEY = now.getDay();
    var DAY_NAMES_ES = ['domingo','lunes','martes','miercoles','jueves','viernes','sabado'];
    var DAY_NAMES_LONG = ['Domingo','Lunes','Martes','Miercoles','Jueves','Viernes','Sabado'];
    var MONTHS = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

    /* XP Levels */
    var XP_LEVELS = [
      { name: 'Novato', min: 0 },
      { name: 'Guerrero', min: 500 },
      { name: 'Titan', min: 1500 },
      { name: 'Leyenda', min: 3000 }
    ];

    var XP_SET = 10;
    var XP_EXERCISE = 50;
    var XP_DAY = 200;

    /* ============================================
       STATE
       ============================================ */
    function dateKey() { return now.toISOString().split('T')[0]; }

    var state = {
      water: VYTAL_DB.localGet('water_' + dateKey(), 0),
      supps: VYTAL_DB.localGet('supps_' + dateKey(), { creatina: false, proteina: false }),
      exerciseSets: VYTAL_DB.localGet('sets_' + dateKey(), {}),
      exerciseWeights: VYTAL_DB.localGet('weights', {}),
      mealsChecked: VYTAL_DB.localGet('meals_' + dateKey(), {}),
      currentNutriDay: DAY_NAMES_ES[TODAY_KEY],
      xp: VYTAL_DB.localGet('xp_total', 0),
      streak: VYTAL_DB.localGet('streak', 0),
      lastTrainingDate: VYTAL_DB.localGet('last_training_date', ''),
      dayCompleted: VYTAL_DB.localGet('day_completed_' + dateKey(), false),
      exerciseCompleted: VYTAL_DB.localGet('ex_completed_' + dateKey(), {})
    };

    function saveState() {
      VYTAL_DB.localSet('water_' + dateKey(), state.water);
      VYTAL_DB.localSet('supps_' + dateKey(), state.supps);
      VYTAL_DB.localSet('sets_' + dateKey(), state.exerciseSets);
      VYTAL_DB.localSet('weights', state.exerciseWeights);
      VYTAL_DB.localSet('meals_' + dateKey(), state.mealsChecked);
      VYTAL_DB.localSet('xp_total', state.xp);
      VYTAL_DB.localSet('streak', state.streak);
      VYTAL_DB.localSet('last_training_date', state.lastTrainingDate);
      VYTAL_DB.localSet('day_completed_' + dateKey(), state.dayCompleted);
      VYTAL_DB.localSet('ex_completed_' + dateKey(), state.exerciseCompleted);
    }

    /* ============================================
       XP SYSTEM
       ============================================ */
    function addXP(amount, label) {
      state.xp += amount;
      saveState();
      renderXPBar();
      showXPPopup('+' + amount + ' XP' + (label ? ' ' + label : ''));
    }

    function getLevel() {
      for (var i = XP_LEVELS.length - 1; i >= 0; i--) {
        if (state.xp >= XP_LEVELS[i].min) return i;
      }
      return 0;
    }

    function renderXPBar() {
      var lvlIdx = getLevel();
      var lvl = XP_LEVELS[lvlIdx];
      var nextLvl = XP_LEVELS[lvlIdx + 1] || null;

      document.getElementById('xpLevelLabel').textContent = lvl.name;

      var pct, label;
      if (nextLvl) {
        var xpInLevel = state.xp - lvl.min;
        var levelSize = nextLvl.min - lvl.min;
        pct = Math.min((xpInLevel / levelSize) * 100, 100);
        label = state.xp + ' / ' + nextLvl.min + ' XP';
      } else {
        pct = 100;
        label = state.xp + ' XP — MAX';
      }

      document.getElementById('xpAmountLabel').textContent = label;
      document.getElementById('xpBarFill').style.width = pct + '%';
    }

    function showXPPopup(text) {
      var popup = document.createElement('div');
      popup.className = 'xp-popup';
      popup.textContent = text;
      document.body.appendChild(popup);
      setTimeout(function() { if (popup.parentNode) popup.parentNode.removeChild(popup); }, 1600);
    }

    /* ============================================
       STREAK SYSTEM
       ============================================ */
    function updateStreak() {
      var today = dateKey();
      if (state.lastTrainingDate === today) return;

      var yesterday = new Date(now);
      yesterday.setDate(yesterday.getDate() - 1);
      var yesterdayKey = yesterday.toISOString().split('T')[0];

      if (state.lastTrainingDate === yesterdayKey || state.lastTrainingDate === '') {
        state.streak++;
      } else {
        state.streak = 1;
      }

      state.lastTrainingDate = today;
      saveState();
    }

    function renderStreak() {
      var el = document.getElementById('streakDisplay');
      var fireEl = document.getElementById('streakFire');
      var textEl = document.getElementById('streakText');

      if (state.streak <= 0) { el.style.display = 'none'; return; }

      el.style.display = 'flex';

      var fire, cls;
      if (state.streak >= 8) { fire = '\uD83D\uDD25\uD83D\uDD25\uD83D\uDD25'; cls = 'streak-fire big'; }
      else if (state.streak >= 4) { fire = '\uD83D\uDD25\uD83D\uDD25'; cls = 'streak-fire medium'; }
      else { fire = '\uD83D\uDD25'; cls = 'streak-fire'; }

      fireEl.className = cls;
      fireEl.textContent = fire;
      textEl.textContent = state.streak + ' dias seguidos';
    }

    /* ============================================
       CONFETTI
       ============================================ */
    function showConfetti(xpEarned) {
      var overlay = document.createElement('div');
      overlay.className = 'confetti-overlay';

      var colors = ['#C4613A', '#5B8C6F', '#C4A86B', '#D4A843', '#E8C860', '#FF6B6B'];
      for (var i = 0; i < 60; i++) {
        var piece = document.createElement('div');
        piece.className = 'confetti-piece';
        piece.style.left = Math.random() * 100 + '%';
        piece.style.top = '-10px';
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDelay = (Math.random() * 1.5) + 's';
        piece.style.animationDuration = (2 + Math.random() * 2) + 's';
        piece.style.width = (6 + Math.random() * 8) + 'px';
        piece.style.height = (6 + Math.random() * 8) + 'px';
        piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        overlay.appendChild(piece);
      }

      var msg = document.createElement('div');
      msg.className = 'day-complete-msg';
      msg.innerHTML = '<h2 style="color:var(--success)">DIA COMPLETADO</h2><div class="xp-earned">+' + xpEarned + ' XP</div><div style="font-size:0.8rem;color:var(--text-secondary);margin-top:8px">Increible esfuerzo</div>';
      overlay.appendChild(msg);

      document.body.appendChild(overlay);

      if (navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 300]);

      setTimeout(function() {
        if (overlay.parentNode) overlay.parentNode.removeChild(overlay);
      }, 4000);
    }

    /* ============================================
       SCHEDULE
       ============================================ */
    var schedule = { 0:'rest', 1:'push', 2:'pull', 3:'rest', 4:'push', 5:'pull', 6:'rest' };
    var scheduleLabels = {
      push: { label: 'Bloque A \u2014 Empuje', sub: '6 ejercicios \u00B7 ~55 min' },
      pull: { label: 'Bloque B \u2014 Traccion', sub: '6 ejercicios \u00B7 ~55 min' },
      rest: { label: 'Descanso', sub: 'Recuperacion activa \u00B7 Descansa bien' }
    };

    function getTodayType() { return schedule[TODAY_KEY]; }

    /* ============================================
       DATE HEADER
       ============================================ */
    function renderDateHeader() {
      var el = document.getElementById('dateLabel');
      if (el) el.textContent = DAY_NAMES_LONG[TODAY_KEY] + ' ' + now.getDate() + ' de ' + MONTHS[now.getMonth()];
    }

    /* ============================================
       DASHBOARD
       ============================================ */
    function renderDashboard() {
      var type = getTodayType();
      var info = scheduleLabels[type];

      var hero = document.getElementById('heroCard');
      hero.className = 'hero-card ' + type;
      document.getElementById('heroTitle').textContent = info.label;
      document.getElementById('heroSubtitle').textContent = info.sub;
      document.getElementById('heroLabel').textContent = type === 'rest' ? 'Hoy es' : 'Hoy toca';
      hero.onclick = function() { if (type !== 'rest') navigateTo('entreno'); };

      renderWeek();

      document.getElementById('statWater').textContent = (state.water * 0.25).toFixed(1) + 'L';
      var suppsDone = (state.supps.creatina ? 1 : 0) + (state.supps.proteina ? 1 : 0);
      document.getElementById('statSupps').textContent = suppsDone + '/2';

      var sessions = 0;
      var mondayIdx = now.getDay() === 0 ? 6 : now.getDay() - 1;
      for (var d = 0; d < mondayIdx; d++) {
        var dayNum = d + 1;
        if (schedule[dayNum] !== 'rest') {
          var key = getDateForWeekday(dayNum);
          var sets = VYTAL_DB.localGet('sets_' + key, {});
          if (Object.keys(sets).length > 0) sessions++;
        }
      }
      if (Object.keys(state.exerciseSets).length > 0) sessions++;
      document.getElementById('statSessions').textContent = sessions;

      renderXPBar();
      renderStreak();
    }

    function getDateForWeekday(dayNum) {
      var d = new Date(now);
      var diff = dayNum - now.getDay();
      d.setDate(d.getDate() + diff);
      return d.toISOString().split('T')[0];
    }

    function renderWeek() {
      var el = document.getElementById('weekDays');
      if (!el) return;
      var dayOrder = [1,2,3,4,5,6,0];
      var names = ['LUN','MAR','MIE','JUE','VIE','SAB','DOM'];
      var todayIdx = TODAY_KEY === 0 ? 6 : TODAY_KEY - 1;
      var html = '';
      for (var i = 0; i < 7; i++) {
        var type = schedule[dayOrder[i]];
        var cls = 'week-day ' + type;
        if (i === todayIdx) cls += ' today';
        if (i < todayIdx) cls += ' completed';
        html += '<div class="' + cls + '"><div class="day-name">' + names[i] + '</div><div class="day-type"></div></div>';
      }
      el.innerHTML = html;
    }

    /* ============================================
       ENTRENO
       ============================================ */
    function renderEntreno() {
      var type = getTodayType();
      var titleEl = document.getElementById('entrenoTitle');
      var listEl = document.getElementById('exerciseList');

      if (type === 'rest') {
        titleEl.textContent = 'Dia de descanso';
        titleEl.className = '';
        listEl.innerHTML = '<div style="text-align:center;padding:40px 0;color:var(--text-muted)">' +
          '<div style="font-size:2.5rem;margin-bottom:12px">&#9968;</div>' +
          '<p style="font-size:.88rem;font-weight:600">Hoy es dia de recuperacion.</p>' +
          '<p style="font-size:.75rem;margin-top:8px">Descansa, estira, hidratate.</p></div>';
        document.getElementById('entrenoProgress').style.display = 'none';
        return;
      }

      document.getElementById('entrenoProgress').style.display = '';
      var block = trainingPlan.blocks[type];
      titleEl.textContent = block.name;
      titleEl.className = type === 'push' ? 'push' : 'pull';

      var progressBar = document.getElementById('dayProgressBar');
      progressBar.className = 'progress-fill ' + (type === 'push' ? 'terracotta' : 'sage');

      var exercises = block.exercises;
      var html = '';
      var firstUncompleted = -1;

      for (var i = 0; i < exercises.length; i++) {
        var ex = exercises[i];
        var setsState = state.exerciseSets[ex.key] || [];
        var lastWeight = state.exerciseWeights[ex.key] || '';
        var isExCompleted = state.exerciseCompleted[ex.key] || false;

        if (!isExCompleted && firstUncompleted === -1) firstUncompleted = i;

        var cardClass = 'exercise-card ' + type + (isExCompleted ? ' ex-completed' : '');

        html += '<div class="' + cardClass + '" id="exCard_' + ex.key + '">';

        // Header
        html += '<div class="exercise-header">';
        html += '<div class="exercise-number">' + (i + 1) + '</div>';
        html += '<div style="flex:1"><div class="exercise-name">' + ex.name + '</div>';
        html += '<div class="exercise-meta">' + (ex.type === 'compound' ? 'Compuesto' : 'Aislamiento') + ' \u00B7 ' + ex.muscles + '</div></div>';
        html += '<span class="completed-badge">\u2713 COMPLETADO</span>';
        html += '</div>';

        // Body (hidden when completed)
        html += '<div class="exercise-body">';

        // SVG
        html += '<div class="svg-container">' + (window.VYTAL_SVG ? VYTAL_SVG.render(ex.key) : '') + '</div>';

        // Detail button
        html += '<div style="text-align:center;margin:-6px 0 12px">';
        html += '<button onclick="openExerciseModal(\'' + ex.key + '\')" style="font-size:.7rem;color:var(--' + (type === 'push' ? 'push-terracotta' : 'pull-sage') + ');font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:6px 16px;border-radius:var(--radius-sm);background:var(--' + (type === 'push' ? 'push-terracotta-soft' : 'pull-sage-soft') + ');border:none;cursor:pointer">Ver fases y errores</button>';
        html += '</div>';

        // Bio tip
        html += '<div class="bio-tip"><strong>Clave:</strong> ' + ex.bio + '</div>';

        // Weight
        html += '<div class="weight-row" style="margin-bottom:14px">';
        html += '<input type="number" class="weight-input" value="' + lastWeight + '" step="2.5" inputmode="decimal" placeholder="kg" data-exercise="' + ex.key + '" onchange="updateWeight(this)">';
        html += '<span class="weight-unit">kg</span>';
        var suggestion = getProgression(ex.key, ex.repRange);
        if (suggestion) html += '<span class="weight-suggestion">' + suggestion + '</span>';
        html += '</div>';

        // Series - with inline rep buttons
        html += '<div class="series-tracker">';
        for (var s = 0; s < ex.sets; s++) {
          var completed = setsState[s] ? true : false;
          var repsVal = setsState[s] || '\u2014';
          html += '<button class="series-btn ' + type + (completed ? ' completed' : '') + '" ' +
            'onclick="toggleSet(event,\'' + ex.key + '\',' + s + ',' + ex.repRange[0] + ',' + ex.repRange[1] + ',' + i + ')" ' +
            'data-set="' + s + '">';
          html += '<div class="series-label">S' + (s + 1) + '</div>';
          html += '<div class="series-reps">' + repsVal + '</div>';
          if (!completed) {
            // Show preset rep buttons
            html += '<div class="rep-selector">';
            var presets = getRepPresets(ex.repRange);
            for (var p = 0; p < presets.length; p++) {
              html += '<span class="rep-preset" onclick="event.stopPropagation(); quickSet(\'' + ex.key + '\',' + s + ',' + presets[p] + ',' + i + ')">' + presets[p] + '</span>';
            }
            html += '</div>';
          }
          html += '</button>';
        }
        html += '</div>';

        // Timer
        var restTime = ex.rest;
        var min = Math.floor(restTime / 60);
        var sec = restTime % 60;
        html += '<div class="rest-timer" id="timer_' + ex.key + '">';
        html += '<button class="timer-btn reset" onclick="resetTimer(this,' + restTime + ')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 005.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 013.51 15"/></svg></button>';
        html += '<div class="timer-display">' + min + ':' + (sec < 10 ? '0' : '') + sec + '</div>';
        html += '<button class="timer-btn start" onclick="startTimer(this)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="5 3 19 12 5 21 5 3"/></svg></button>';
        html += '</div>';

        html += '</div>'; // exercise-body
        html += '</div>'; // exercise-card
      }

      listEl.innerHTML = html;
      updateDayProgress(exercises);

      // Auto-scroll to first uncompleted
      if (firstUncompleted > 0) {
        var targetCard = document.getElementById('exCard_' + exercises[firstUncompleted].key);
        if (targetCard) {
          setTimeout(function() { targetCard.scrollIntoView({ behavior: 'smooth', block: 'center' }); }, 300);
        }
      }
    }

    function getRepPresets(repRange) {
      var presets = [];
      var lo = repRange[0];
      var hi = repRange[1];
      if (hi - lo >= 4) {
        presets.push(lo);
        presets.push(Math.round((lo + hi) / 2));
        presets.push(hi);
      } else {
        for (var r = lo; r <= hi; r++) presets.push(r);
        if (presets.length > 4) presets = [lo, Math.round((lo + hi) / 2), hi];
      }
      return presets;
    }

    function updateDayProgress(exercises) {
      if (!exercises) return;
      var total = exercises.length;
      var done = 0;
      for (var i = 0; i < exercises.length; i++) {
        if (state.exerciseCompleted[exercises[i].key]) { done++; continue; }
        var sets = state.exerciseSets[exercises[i].key] || [];
        var allDone = true;
        for (var s = 0; s < exercises[i].sets; s++) {
          if (!sets[s]) { allDone = false; break; }
        }
        if (allDone && sets.length >= exercises[i].sets) done++;
      }
      var pct = total > 0 ? Math.round(done / total * 100) : 0;
      document.getElementById('dayProgressLabel').textContent = done + '/' + total + ' ejercicios';
      document.getElementById('dayProgressPct').textContent = pct + '%';
      document.getElementById('dayProgressBar').style.width = pct + '%';
    }

    function getProgression(key, repRange) {
      var lastSets = state.exerciseSets[key] || [];
      if (lastSets.length === 0) return '';
      var allMaxed = true;
      for (var i = 0; i < lastSets.length; i++) {
        if (!lastSets[i] || lastSets[i] < repRange[1]) { allMaxed = false; break; }
      }
      if (allMaxed && lastSets.length >= 3) return '\u2191 Sube +2.5kg';
      return '';
    }

    function checkExerciseComplete(exKey, exerciseIdx) {
      var type = getTodayType();
      if (type === 'rest') return;
      var block = trainingPlan.blocks[type];
      var ex = block.exercises[exerciseIdx];
      if (!ex) return;

      var sets = state.exerciseSets[exKey] || [];
      var allDone = true;
      for (var s = 0; s < ex.sets; s++) {
        if (!sets[s]) { allDone = false; break; }
      }

      if (allDone && !state.exerciseCompleted[exKey]) {
        state.exerciseCompleted[exKey] = true;
        addXP(XP_EXERCISE, '\u2014 Ejercicio completo');
        if (navigator.vibrate) navigator.vibrate(100);

        // Collapse card
        var card = document.getElementById('exCard_' + exKey);
        if (card) {
          card.classList.add('ex-completed');
        }

        // Check day completion
        checkDayComplete(block.exercises);

        // Auto-scroll to next
        var nextIdx = exerciseIdx + 1;
        if (nextIdx < block.exercises.length) {
          var nextCard = document.getElementById('exCard_' + block.exercises[nextIdx].key);
          if (nextCard) {
            setTimeout(function() { nextCard.scrollIntoView({ behavior: 'smooth', block: 'center' }); }, 400);
          }
        }

        saveState();
      } else if (!allDone && state.exerciseCompleted[exKey]) {
        state.exerciseCompleted[exKey] = false;
        saveState();
        var card2 = document.getElementById('exCard_' + exKey);
        if (card2) card2.classList.remove('ex-completed');
      }

      updateDayProgress(block.exercises);
    }

    function checkDayComplete(exercises) {
      if (state.dayCompleted) return;
      var allDone = true;
      for (var i = 0; i < exercises.length; i++) {
        if (!state.exerciseCompleted[exercises[i].key]) { allDone = false; break; }
      }
      if (allDone) {
        state.dayCompleted = true;
        updateStreak();
        addXP(XP_DAY, '\u2014 DIA COMPLETADO');
        saveState();
        showConfetti(XP_DAY);
      }
    }

    /* ============================================
       NUTRICION
       ============================================ */
    function renderNutricion() {
      var tabsEl = document.getElementById('nutriDayTabs');
      var daysOrder = ['lunes','martes','miercoles','jueves','viernes','sabado','domingo'];
      var daysLabels = ['LUN','MAR','MIE','JUE','VIE','SAB','DOM'];
      var tabsHtml = '';
      for (var i = 0; i < daysOrder.length; i++) {
        var d = daysOrder[i];
        var dayData = nutritionPlan.days[d];
        var isActive = d === state.currentNutriDay;
        var cls = 'day-tab ' + (dayData.type === 'training' ? 'training' : 'rest') + (isActive ? ' active' : '');
        tabsHtml += '<button class="' + cls + '" onclick="switchNutriDay(\'' + d + '\')">' + daysLabels[i] + '</button>';
      }
      tabsEl.innerHTML = tabsHtml;
      renderNutriDay(state.currentNutriDay);
      renderWater('nutriWaterGlasses', 'nutriWaterCount');
      renderGroceryList();
    }

    function renderNutriDay(dayKey) {
      var dayData = nutritionPlan.days[dayKey];
      if (!dayData) return;

      var targets = nutritionPlan.targets;
      var macrosEl = document.getElementById('nutriMacros');
      var macros = [
        { label: 'Proteina', value: dayData.totalP, target: targets.protein.max, color: 'var(--push-terracotta)' },
        { label: 'Carbos', value: dayData.totalC, target: targets.carbs.max, color: 'var(--pull-sage)' },
        { label: 'Grasas', value: dayData.totalG, target: targets.fat.max, color: 'var(--accent-sand)' }
      ];

      var circumference = 2 * Math.PI * 26;
      var mHtml = '';
      for (var m = 0; m < macros.length; m++) {
        var pct = Math.min(macros[m].value / macros[m].target, 1);
        var offset = circumference * (1 - pct);
        mHtml += '<div class="macro-item"><div class="macro-ring">';
        mHtml += '<svg viewBox="0 0 64 64"><circle class="ring-bg" cx="32" cy="32" r="26"/>';
        mHtml += '<circle class="ring-fill" cx="32" cy="32" r="26" stroke="' + macros[m].color + '" stroke-dasharray="' + circumference.toFixed(1) + '" stroke-dashoffset="' + offset.toFixed(1) + '"/></svg>';
        mHtml += '<div class="ring-value" style="color:' + macros[m].color + '">' + macros[m].value + 'g</div>';
        mHtml += '</div><div class="macro-label">' + macros[m].label + '</div></div>';
      }
      macrosEl.innerHTML = mHtml;

      var mealEl = document.getElementById('mealList');
      var meals = dayData.meals;
      var mealHtml = '';
      for (var j = 0; j < meals.length; j++) {
        var meal = meals[j];
        mealHtml += '<div class="meal-card">';
        mealHtml += '<div class="meal-header"><div class="meal-name">' + meal.name + '</div><div class="meal-kcal">' + meal.kcal + ' kcal</div></div>';
        mealHtml += '<ul class="meal-items">';
        for (var k = 0; k < meal.items.length; k++) {
          mealHtml += '<li class="meal-item"><span class="item-name">' + meal.items[k].name + '</span><span class="item-amount">' + meal.items[k].amount + '</span></li>';
        }
        mealHtml += '</ul>';
        mealHtml += '<div class="meal-macros"><span>P: ' + meal.protein + 'g</span><span>C: ' + meal.carbs + 'g</span><span>G: ' + meal.fat + 'g</span><span>' + meal.prepTime + ' min</span></div>';
        mealHtml += '</div>';
      }
      mealEl.innerHTML = mealHtml;
    }

    function renderGroceryList() {
      var el = document.getElementById('grocerySection');
      if (!nutritionPlan.groceryList) { el.innerHTML = ''; return; }
      var gl = nutritionPlan.groceryList;
      var categories = {
        proteinas: 'Proteinas', lacteos: 'Lacteos', carbohidratos: 'Carbohidratos',
        frutas_verduras: 'Frutas y Verduras', despensa: 'Despensa', suplementos: 'Suplementos'
      };
      var html = '<h3 style="font-size:.82rem;color:var(--text-primary);margin-bottom:14px;letter-spacing:.08em;font-weight:800">Lista del Super Semanal</h3>';
      var keys = Object.keys(categories);
      for (var i = 0; i < keys.length; i++) {
        var items = gl[keys[i]];
        if (!items || items.length === 0) continue;
        html += '<div class="grocery-section"><div class="grocery-title">' + categories[keys[i]] + '</div>';
        for (var j = 0; j < items.length; j++) {
          html += '<div class="grocery-item">' + items[j] + '</div>';
        }
        html += '</div>';
      }
      el.innerHTML = html;
    }

    /* ============================================
       SUPLEMENTOS
       ============================================ */
    function renderSuplementos() {
      var type = getTodayType();
      var isTraining = type !== 'rest';
      var html = '';

      html += '<div class="supplement-card" onclick="toggleSuppState(\'creatina\')">';
      html += '<div class="supp-icon" style="background:linear-gradient(135deg, var(--push-terracotta-soft), var(--push-terracotta-medium))"><svg viewBox="0 0 24 24" fill="none" stroke="var(--push-terracotta)" stroke-width="1.8" stroke-linecap="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg></div>';
      html += '<div class="supp-info"><div class="supp-name">Creatina Monohidrato</div><div class="supp-dose">5g diarios \u00B7 Optimum Nutrition</div>';
      html += '<div class="supp-dose" style="color:var(--text-muted);margin-top:1px">Todos los dias, cualquier momento</div></div>';
      html += '<div class="supp-check ' + (state.supps.creatina ? 'done' : '') + '">\u2713</div></div>';

      html += '<div class="supplement-card' + (!isTraining ? '" style="opacity:0.5' : '') + '" onclick="' + (isTraining ? 'toggleSuppState(\'proteina\')' : '') + '">';
      html += '<div class="supp-icon" style="background:linear-gradient(135deg, var(--pull-sage-soft), var(--pull-sage-medium))"><svg viewBox="0 0 24 24" fill="none" stroke="var(--pull-sage)" stroke-width="1.8" stroke-linecap="round"><path d="M8 2h8v4a4 4 0 01-4 4 4 4 0 01-4-4V2z"/><path d="M8 10v8a4 4 0 004 4 4 4 0 004-4v-8"/></svg></div>';
      html += '<div class="supp-info"><div class="supp-name">Proteina Whey</div><div class="supp-dose">1 scoop post-entreno \u00B7 Optimum Nutrition</div>';
      html += '<div class="supp-dose" style="color:var(--text-muted);margin-top:1px">' + (isTraining ? 'Hoy es dia de entrenamiento' : 'Solo dias de entrenamiento (hoy no)') + '</div></div>';
      html += '<div class="supp-check ' + (state.supps.proteina ? 'done' : '') + '">\u2713</div></div>';

      document.getElementById('suppList').innerHTML = html;
      renderWater('suppWaterGlasses', 'suppWaterCount');
    }

    /* ============================================
       WATER TRACKER
       ============================================ */
    function renderWater(containerId, countId) {
      var el = document.getElementById(containerId);
      var countEl = document.getElementById(countId);
      if (!el) return;
      var total = 12;
      var filled = state.water;
      var dropSvg = '<svg viewBox="0 0 24 24"><path d="M12 2.69l5.66 5.66a8 8 0 11-11.31 0L12 2.69z"/></svg>';
      var html = '';
      for (var i = 0; i < total; i++) {
        html += '<div class="water-glass ' + (i < filled ? 'filled' : '') + '" onclick="toggleWaterGlass(' + i + ')">' + dropSvg + '</div>';
      }
      el.innerHTML = html;
      if (countEl) countEl.textContent = filled + '/' + total;
    }

    /* ============================================
       INTERACTIONS
       ============================================ */

    // Quick set (tap preset rep number)
    window.quickSet = function(exKey, setIdx, reps, exerciseIdx) {
      if (!state.exerciseSets[exKey]) state.exerciseSets[exKey] = [];
      state.exerciseSets[exKey][setIdx] = reps;
      addXP(XP_SET, '');
      if (navigator.vibrate) navigator.vibrate(30);
      saveState();

      // Log to Supabase
      var weight = state.exerciseWeights[exKey] || 0;
      VYTAL_DB.insert('exercise_logs', {
        ejercicio_key: exKey, peso_kg: parseFloat(weight),
        serie: setIdx + 1, reps: reps, fecha: dateKey()
      });

      // Auto-start timer
      autoStartTimer(exKey);

      checkExerciseComplete(exKey, exerciseIdx);
      renderEntreno();
    };

    window.toggleSet = function(event, exKey, setIdx, minReps, maxReps, exerciseIdx) {
      // If clicking a preset, that handler takes over
      if (event.target.classList.contains('rep-preset')) return;

      if (!state.exerciseSets[exKey]) state.exerciseSets[exKey] = [];
      var sets = state.exerciseSets[exKey];

      if (sets[setIdx]) {
        // Uncomplete
        sets[setIdx] = 0;
        if (state.exerciseCompleted[exKey]) {
          state.exerciseCompleted[exKey] = false;
          state.dayCompleted = false;
        }
        saveState();
        renderEntreno();
      } else {
        // One-tap complete with max reps (reduce friction)
        sets[setIdx] = maxReps;
        addXP(XP_SET, '');
        if (navigator.vibrate) navigator.vibrate(30);
        saveState();

        var weight = state.exerciseWeights[exKey] || 0;
        VYTAL_DB.insert('exercise_logs', {
          ejercicio_key: exKey, peso_kg: parseFloat(weight),
          serie: setIdx + 1, reps: maxReps, fecha: dateKey()
        });

        autoStartTimer(exKey);
        checkExerciseComplete(exKey, exerciseIdx);
        renderEntreno();
      }
    };

    function autoStartTimer(exKey) {
      var timerContainer = document.getElementById('timer_' + exKey);
      if (!timerContainer) return;
      var startBtn = timerContainer.querySelector('.timer-btn.start');
      if (startBtn) {
        setTimeout(function() { startTimer(startBtn); }, 100);
      }
    }

    window.updateWeight = function(input) {
      var key = input.getAttribute('data-exercise');
      state.exerciseWeights[key] = input.value;
      saveState();
    };

    window.toggleSuppState = function(supp) {
      state.supps[supp] = !state.supps[supp];
      saveState();
      renderSuplementos();
      renderDashboard();
      VYTAL_DB.insert('supplement_logs', {
        fecha: dateKey(), creatina: state.supps.creatina,
        proteina: state.supps.proteina, agua_vasos: state.water
      });
    };

    window.toggleWaterGlass = function(idx) {
      if (idx < state.water) state.water = idx;
      else state.water = idx + 1;
      saveState();
      renderWater('nutriWaterGlasses', 'nutriWaterCount');
      renderWater('suppWaterGlasses', 'suppWaterCount');
      renderDashboard();
    };

    window.switchNutriDay = function(dayKey) {
      state.currentNutriDay = dayKey;
      renderNutricion();
    };

    /* Timer */
    var activeTimers = {};

    window.startTimer = function(btn) {
      var container = btn.closest('.rest-timer');
      var display = container.querySelector('.timer-display');
      var id = container.getAttribute('data-timer-id') || ('t' + Date.now());
      container.setAttribute('data-timer-id', id);

      if (activeTimers[id]) clearInterval(activeTimers[id]);

      var parts = display.textContent.split(':');
      var seconds = parseInt(parts[0]) * 60 + parseInt(parts[1]);
      if (seconds <= 0) return;

      container.classList.add('running');
      container.classList.remove('done');

      activeTimers[id] = setInterval(function() {
        seconds--;
        if (seconds <= 0) {
          clearInterval(activeTimers[id]);
          display.textContent = '0:00';
          container.classList.remove('running');
          container.classList.add('done');
          if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
          return;
        }
        var m = Math.floor(seconds / 60);
        var s = seconds % 60;
        display.textContent = m + ':' + (s < 10 ? '0' : '') + s;
      }, 1000);
    };

    window.resetTimer = function(btn, totalSeconds) {
      var container = btn.closest('.rest-timer');
      var display = container.querySelector('.timer-display');
      var id = container.getAttribute('data-timer-id');
      if (id && activeTimers[id]) clearInterval(activeTimers[id]);
      container.classList.remove('running', 'done');
      var m = Math.floor(totalSeconds / 60);
      var s = totalSeconds % 60;
      display.textContent = m + ':' + (s < 10 ? '0' : '') + s;
    };

    /* Modal */
    window.openExerciseModal = function(key) {
      var ex = null;
      var blocks = ['push', 'pull'];
      for (var b = 0; b < blocks.length; b++) {
        var exs = trainingPlan.blocks[blocks[b]].exercises;
        for (var i = 0; i < exs.length; i++) {
          if (exs[i].key === key) { ex = exs[i]; break; }
        }
        if (ex) break;
      }
      if (!ex) return;

      var html = '<button class="modal-close" onclick="closeModal()">\u2715</button>';
      html += '<div class="modal-title">' + ex.name + '</div>';
      html += '<div class="phase-item"><div class="phase-label start">Posicion inicial</div><div class="phase-text">' + ex.phases.start + '</div></div>';
      html += '<div class="phase-item"><div class="phase-label ecc">Fase excentrica (bajar)</div><div class="phase-text">' + ex.phases.eccentric + '</div></div>';
      html += '<div class="phase-item"><div class="phase-label con">Fase concentrica (subir)</div><div class="phase-text">' + ex.phases.concentric + '</div></div>';
      html += '<div style="margin-top:16px"><div class="phase-label" style="color:var(--danger);margin-bottom:4px">Errores comunes</div>';
      html += '<ul class="error-list">';
      for (var e = 0; e < ex.errors.length; e++) html += '<li>' + ex.errors[e] + '</li>';
      html += '</ul></div>';
      html += '<div style="margin-top:16px;padding:12px;background:var(--bg-warm);border-radius:var(--radius-sm);font-size:.75rem;color:var(--text-secondary)">';
      html += '<strong>' + ex.sets + ' series</strong> de <strong>' + ex.repRange[0] + '-' + ex.repRange[1] + ' reps</strong>';
      html += ' \u00B7 Descanso: <strong>' + (ex.rest >= 60 ? (ex.rest / 60) + ' min' : ex.rest + ' seg') + '</strong>';
      html += '</div>';

      document.getElementById('modalBox').innerHTML = html;
      document.getElementById('modalOverlay').classList.add('open');
    };

    window.closeModal = function(event) {
      if (event && event.target !== document.getElementById('modalOverlay') && !event.target.classList.contains('modal-close')) return;
      document.getElementById('modalOverlay').classList.remove('open');
    };

    /* Navigation */
    var pageMap = { dashboard:'pageDashboard', entreno:'pageEntreno', nutricion:'pageNutricion', suplementos:'pageSuplementos' };

    window.navigateTo = function(page) {
      var pages = document.querySelectorAll('.page');
      for (var i = 0; i < pages.length; i++) pages[i].classList.remove('active');
      var el = document.getElementById(pageMap[page]);
      if (el) { el.classList.add('active'); el.style.animation = 'none'; el.offsetHeight; el.style.animation = 'fadeIn .25s ease'; }
      var navItems = document.querySelectorAll('.nav-item');
      for (var j = 0; j < navItems.length; j++) {
        navItems[j].classList.remove('active');
        if (navItems[j].getAttribute('data-page') === page) navItems[j].classList.add('active');
      }
      window.scrollTo(0, 0);
      if (page === 'entreno') renderEntreno();
      if (page === 'nutricion') renderNutricion();
      if (page === 'suplementos') renderSuplementos();
      if (page === 'dashboard') renderDashboard();
    };

    /* ============================================
       RENDER ALL
       ============================================ */
    function renderAll() {
      renderDateHeader();
      renderDashboard();
    }

    /* ============================================
       INIT
       ============================================ */
    renderAll();

  })();
  </script>

</body>
</html>
