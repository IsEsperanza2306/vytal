<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C4613A"/>
      <stop offset="100%" style="stop-color:#8C3820"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <text x="256" y="200" font-family="Arial Black,Arial,sans-serif" font-weight="900" font-size="120" fill="rgba(255,255,255,0.15)" text-anchor="middle" letter-spacing="12">VYTAL</text>
  <!-- Barbell icon -->
  <g transform="translate(256,300)" stroke="#FFF" stroke-width="8" stroke-linecap="round" fill="none">
    <!-- Bar -->
    <line x1="-120" y1="0" x2="120" y2="0"/>
    <!-- Left plate -->
    <rect x="-140" y="-35" width="28" height="70" rx="6" fill="#FFF" opacity="0.9"/>
    <rect x="-160" y="-25" width="24" height="50" rx="5" fill="#FFF" opacity="0.6"/>
    <!-- Right plate -->
    <rect x="112" y="-35" width="28" height="70" rx="6" fill="#FFF" opacity="0.9"/>
    <rect x="136" y="-25" width="24" height="50" rx="5" fill="#FFF" opacity="0.6"/>
  </g>
  <!-- V letter accent -->
  <text x="256" y="430" font-family="Arial Black,Arial,sans-serif" font-weight="900" font-size="48" fill="rgba(255,255,255,0.3)" text-anchor="middle" letter-spacing="20">VYTAL</text>
</svg>
